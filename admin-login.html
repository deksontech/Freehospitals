<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freehospitals Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260413-2" />
    <link rel="icon" href="assets/favicon.png" type="image/png" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form class="login-card" id="adminLoginForm">
        <a class="brand" href="index.html" aria-label="Freehospitals home">
          <img class="brand-logo" src="assets/freehospitals-logo.png" alt="Freehospitals" />
        </a>
        <div>
          <p class="eyebrow">Admin login</p>
          <h1>Welcome back.</h1>
          <p>Use the super admin password from `.env`, or sign in with an admin email and password.</p>
        </div>
        <label class="field" for="adminIdentifier">
          <span>Admin email</span>
          <input id="adminIdentifier" name="identifier" type="email" placeholder="Leave blank for super admin login" />
        </label>
        <label class="field" for="adminPassword">
          <span>Password</span>
          <input id="adminPassword" name="password" type="password" placeholder="Admin password" required />
        </label>
        <button class="primary-button" type="submit">Login</button>
        <p class="form-note" id="loginMessage">Leave email blank to use the super admin password from `.env`.</p>
      </form>
    </main>

    <script src="admin-login.js"></script>
  </body>
</html>
